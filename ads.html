<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Performance Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#209D50; --primary-dark:#1a8a44;
  --bg:#E1DFD9; --card:#fff; --border:#C8C5BE; --header-bg:#F5F4F1;
  --text:#1a1a1a; --muted:#666; --good:#209D50; --bad:#E53935;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--text); line-height:1.5; padding:24px;}
.wrap{max-width:1200px; margin:0 auto;}
.head{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; flex-wrap:wrap; gap:12px;}
.brand{display:flex; align-items:center; gap:10px;}
.brand .dot{width:30px; height:30px; border-radius:7px; background:var(--primary);
  display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:15px;}
.brand .name{font-size:15px; font-weight:700; letter-spacing:2px; color:var(--primary);}
.title{font-size:22px; font-weight:700;}
.sub{font-size:13px; color:var(--muted); margin-bottom:16px;}

/* Controls */
.controls{display:flex; flex-wrap:wrap; gap:10px; align-items:center; background:var(--card);
  border:1px solid var(--border); border-radius:12px; padding:10px 14px; margin-bottom:16px;}
.controls label{font-size:12px; color:var(--muted); display:flex; align-items:center; gap:5px;}
.controls input[type=date],.controls select{font:inherit; font-size:13px; padding:4px 7px;
  border:1px solid var(--border); border-radius:7px; background:#fff;}
.preset{font-size:12.5px; padding:5px 11px; border-radius:20px; border:1px solid var(--border);
  background:#fff; cursor:pointer;}
.preset.active{background:var(--primary); color:#fff; border-color:var(--primary);}
.spacer{flex:1;}

/* Tabs */
.tabs{display:flex; gap:4px; flex-wrap:wrap; margin-bottom:16px;}
.tab-btn{font-size:13px; padding:8px 16px; border-radius:9px 9px 0 0; border:1px solid transparent;
  background:transparent; cursor:pointer; color:var(--muted); font-weight:600;}
.tab-btn.active{background:var(--card); color:var(--text); border-color:var(--border); border-bottom-color:var(--card);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* KPIs */
.kpis{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:20px;}
.kpi{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 18px;}
.kpi .label{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px;}
.kpi .val{font-size:26px; font-weight:700; margin-top:4px;}

/* Cards + charts */
.card{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 20px; margin-bottom:18px;}
.card h2{font-size:16px; font-weight:700; margin-bottom:14px;}
.chart-wrap{position:relative; height:300px;}
.chart-row{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
@media(max-width:760px){.chart-row{grid-template-columns:1fr;}}

/* Table */
table{width:100%; border-collapse:collapse; font-size:13.5px;}
th,td{text-align:left; padding:9px 10px; border-bottom:1px solid var(--border); white-space:nowrap;}
th{font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); cursor:pointer; user-select:none;}
th.num,td.num{text-align:right;}
tbody tr:hover{background:var(--header-bg);}
.thumb{width:42px; height:42px; border-radius:6px; object-fit:cover; background:var(--header-bg); display:block;}
.adname{white-space:normal; min-width:200px; font-weight:600;}
.pill{display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px; background:var(--header-bg); color:var(--muted);}
.ai-pill{display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px;
  background:rgba(32,157,80,.12); color:var(--primary-dark); font-weight:600;}
th.ai,td.ai{background:rgba(32,157,80,.05);}
.aimark{font-size:10px; font-weight:700; color:var(--primary); background:rgba(32,157,80,.12);
  padding:1px 7px; border-radius:20px; margin-left:6px; vertical-align:middle;}
.good{color:var(--good); font-weight:700;} .bad{color:var(--bad); font-weight:700;}
.loading,.err{text-align:center; padding:60px 20px; color:var(--muted);}
.err{color:var(--bad);}
.note{font-size:12px; color:var(--muted); margin-top:4px;}
/* editable tags */
td.edit{cursor:text;}
td.edit:hover{outline:1px dashed var(--primary); outline-offset:-2px;}
td.edit:hover::after{content:"✎"; font-size:10px; color:var(--primary); opacity:.6; margin-left:5px;}
td.saved{background:rgba(32,157,80,.14);} td.unsaved{background:rgba(255,193,7,.22);}
select.cell-edit,input.cell-edit{font:inherit; padding:2px 4px; border:1px solid var(--primary); border-radius:5px; max-width:190px;}
.warn-bar{background:#FFF7E6; border:1px solid #F0C36D; color:#7a5b00; font-size:12.5px; padding:8px 12px; border-radius:8px; margin-bottom:14px;}
.modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.4); display:none; align-items:center; justify-content:center; z-index:50;}
.modal-bg.show{display:flex;}
.modal{background:#fff; border-radius:12px; padding:24px; max-width:390px; box-shadow:0 8px 40px rgba(0,0,0,.2);}
.modal h3{margin-bottom:10px; font-size:16px;} .modal p{font-size:13.5px; color:var(--muted); margin-bottom:16px;}
.modal label{font-size:12px; display:block; margin-bottom:16px;}
.modal .row{display:flex; gap:10px; justify-content:flex-end;}
.modal button{padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:#fff; cursor:pointer; font-size:13px;}
.modal button.primary{background:var(--primary); color:#fff; border-color:var(--primary);}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="brand"><div class="dot" id="brandDot">C</div><div class="name" id="brandName">CASSA STRATEGY</div></div>
    <div class="sub" id="range" style="margin:0;"></div>
  </div>
  <div class="title" id="clientTitle">Ad Performance</div>
  <div class="sub" id="clientSub">Keyed on ad ID, so renames never break it.</div>

  <div id="content"><div class="loading">Loading live data…</div></div>
</div>

<script src="ads-clients.js"></script>
<script>
/* ============================================================
   Flexible multi-client ad dashboard. Reads the daily ad-level
   tab + the AI tags from one product sheet (per ?client=),
   joins tags onto daily rows by Ad ID, and date-filters.
   ============================================================ */
const PARAMS = new URLSearchParams(location.search);
const CLIENTS = window.AD_CLIENTS || {};
const CLIENT_KEY = PARAMS.get("client") || Object.keys(CLIENTS)[0];
const CFG = CLIENTS[CLIENT_KEY];

if(!CFG){
  document.getElementById("content").innerHTML =
    `<div class="err">Unknown client "<b>${CLIENT_KEY||""}</b>".<br><span class="note">`+
    `Known: ${Object.keys(CLIENTS).join(", ")||"none"}. Pass one as <code>?client=&lt;key&gt;</code>.</span></div>`;
  throw new Error("unknown client");
}

const BRAND=CFG.brand, SHEET_ID=CFG.sheetId;
const DAILY_TAB=CFG.dailyTab||"Ad Daily", TAG_TAB=CFG.tagTab||"Tagging", PERF_TAB=CFG.tab||"Ad Performance";
const IS_ROAS=CFG.resultMetric==="roas";
const AI_DIMS=CFG.aiDims||[];
const EDIT_OPTIONS=CFG.editOptions||{};   // controlled-dim dropdown values; others edit as text
const WEBHOOK_URL=CFG.webhookUrl||"";     // Apps Script /exec to save tag edits back
const DERIVED_DIMS=["Format","Audience","Funnel","Objective"];
const BREAKDOWN_DIMS=DERIVED_DIMS.concat(AI_DIMS);
const RESULT_LABEL=CFG.resultLabel || (IS_ROAS?"Revenue":"Leads");
const RESULT_ONE=RESULT_LABEL.replace(/s$/,"").toLowerCase();   // "lead" / "purchase"

document.getElementById("brandName").textContent=BRAND.name;
document.getElementById("brandDot").textContent=BRAND.initial;
document.getElementById("brandDot").style.background=BRAND.color;
document.getElementById("clientTitle").textContent=CFG.title||"Ad Performance";
if(CFG.subtitle) document.getElementById("clientSub").textContent=CFG.subtitle;
document.documentElement.style.setProperty("--primary",BRAND.color);
document.title=CFG.title||"Ad Performance";

const COLORS=["#209D50","#4A90D9","#FF6B6B","#FFA500","#9D50D9","#50C8D9","#D4A843","#E8527A","#7BC67E","#6B8DE3"];
const money=v=>"$"+(+v||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const num=v=>Math.round(+v||0).toLocaleString();
const pv=v=>{ if(v==null||v==="") return 0; if(typeof v==="number") return v; return parseFloat(String(v).replace(/[$,%]/g,""))||0; };

// gviz with headers=1 (pins header to row 1 so upsert-frozen string rows aren't dropped).
function gvizUrl(tab){ return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${encodeURIComponent(tab)}&t=${Date.now()}`; }
function parseGviz(text){
  const j=JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}")+1));
  const cols=(j.table.cols||[]).map(c=>c.label||"");
  const rows=(j.table.rows||[]).map(r=>{ const o={}; (r.c||[]).forEach((c,i)=>{
    let v=c?c.v:null;
    if(typeof v==="string" && v.indexOf("Date(")===0){ const p=v.slice(5,-1).split(","); v=p[0]+"-"+String(+p[1]+1).padStart(2,"0")+"-"+String(+p[2]).padStart(2,"0"); }
    o[cols[i]]=v; }); return o; });
  return {cols, rows};
}

let ROWS=[], DMIN="", DMAX="", state={from:"",to:"",tab:"overview"}, charts={};
let BUDGETS={};   // {'YYYY-MM': monthly budget} from the sheet's Budgets tab (optional)

// Most recent Budgets-tab month at or before ym applies (one row carries forward).
function monthlyBudgetFor(ym){
  if(BUDGETS[ym]) return BUDGETS[ym];
  let best=0;
  Object.keys(BUDGETS).sort().forEach(m=>{ if(m<=ym) best=BUDGETS[m]; });
  return best;
}

Promise.all([fetch(gvizUrl(DAILY_TAB)).then(r=>r.text()),
             fetch(gvizUrl(TAG_TAB)).then(r=>r.text()),
             fetch(gvizUrl(PERF_TAB)).then(r=>r.text()).catch(()=>""),
             fetch(gvizUrl("Budgets")).then(r=>r.text()).catch(()=>"")])
 .then(([dailyT, tagT, perfT, budgetT])=>{
   try{ parseGviz(budgetT).rows.forEach(r=>{
     const m=String(r["Month"]||"").slice(0,7);
     const b=parseFloat(String(r["Budget"]||"").replace(/[$,]/g,""));
     if(/^\d{4}-\d{2}$/.test(m) && b>0) BUDGETS[m]=b; }); }catch(e){}
   const daily=parseGviz(dailyT).rows.filter(r=>r["Ad ID"] && r["Date"]);
   const tagsParsed=parseGviz(tagT);
   const tagCols=tagsParsed.cols.filter(c=>c!=="Ad ID"&&c!=="Ad Name");
   const tags={};
   tagsParsed.rows.forEach(r=>{ const id=String(r["Ad ID"]||"").trim(); if(!id) return;
     const o={}; tagCols.forEach(c=>o[c]=r[c]||""); tags[id]=o; });
   // ad copy (headline + primary text) by Ad ID, from the perf tab
   const copy={};
   try{ parseGviz(perfT).rows.forEach(r=>{ const id=String(r["Ad ID"]||"").trim();
     if(id) copy[id]={headline:r["Headline"]||"", body:r["Primary Text"]||""}; }); }catch(e){}
   // join tags + copy onto daily rows by Ad ID + coerce numerics
   ROWS=daily.map(r=>{
     const id=String(r["Ad ID"]).trim();
     const o=Object.assign({}, r, tags[id]||{});
     const c=copy[id]||{}; o._headline=c.headline||""; o._body=c.body||"";
     o._date=String(o["Date"]).slice(0,10);
     o._spend=pv(o["Spend"]); o._imp=pv(o["Impressions"]); o._clicks=pv(o["Clicks"]);
     o._leads=pv(o["Leads"]); o._rev=pv(o["Revenue"]);
     return o;
   });
   const ds=ROWS.map(r=>r._date).filter(Boolean).sort();
   DMIN=ds[0]||""; DMAX=ds[ds.length-1]||"";
   state.from=DMIN; state.to=DMAX;
   buildShell(); render();
 })
 .catch(e=>{ document.getElementById("content").innerHTML=
   `<div class="err">Couldn't load the data.<br><span class="note">If the sheet isn't shared link-readable, the dashboard can't read it. (${e})</span></div>`; });

/* ── Aggregation helpers ─────────────────────────────────────────── */
function filtered(){ return ROWS.filter(r=>r._date>=state.from && r._date<=state.to); }
function agg(rows){ let spend=0,leads=0,rev=0,imp=0,clicks=0;
  rows.forEach(r=>{spend+=r._spend;leads+=r._leads;rev+=r._rev;imp+=r._imp;clicks+=r._clicks;});
  return {spend,leads,rev,imp,clicks,cpa:leads?spend/leads:0,roas:spend&&rev?rev/spend:0,ads:new Set(rows.map(r=>r["Ad ID"])).size};
}
function groupBy(rows,key){ const g={}; rows.forEach(r=>{ const k=(r[key]||"").toString().trim()||"(none)"; (g[k]=g[k]||[]).push(r); }); return g; }

/* ── Shell (controls + tabs) ─────────────────────────────────────── */
function buildShell(){
  const presets=["7d","14d","30d","All"].map(p=>`<button class="preset" data-preset="${p}">${p}</button>`).join("");
  document.getElementById("content").innerHTML=`
    <div class="controls">
      <label>From <input type="date" id="cFrom" value="${state.from}" min="${DMIN}" max="${DMAX}"></label>
      <label>To <input type="date" id="cTo" value="${state.to}" min="${DMIN}" max="${DMAX}"></label>
      ${presets}
      <span class="spacer"></span>
      <span class="note" id="rowNote"></span>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="overview">Overview</button>
      <button class="tab-btn" data-tab="trends">Trends</button>
      <button class="tab-btn" data-tab="leaderboard">Leaderboard</button>
      <button class="tab-btn" data-tab="campaigns">Campaigns</button>
      <button class="tab-btn" data-tab="breakdowns">Breakdowns</button>
      <button class="tab-btn" data-tab="byad">By Ad</button>
      <button class="tab-btn" data-tab="headlines">Headlines &amp; Copy</button>
      <button class="tab-btn" data-tab="funnel">Funnel</button>
      <button class="tab-btn" data-tab="pacing">Budget Pacing</button>
      <button class="tab-btn" data-tab="creative">Creative</button>
    </div>
    <div id="tab-overview" class="tab-content active"></div>
    <div id="tab-trends" class="tab-content"></div>
    <div id="tab-leaderboard" class="tab-content"></div>
    <div id="tab-campaigns" class="tab-content"></div>
    <div id="tab-breakdowns" class="tab-content"></div>
    <div id="tab-byad" class="tab-content"></div>
    <div id="tab-headlines" class="tab-content"></div>
    <div id="tab-funnel" class="tab-content"></div>
    <div id="tab-pacing" class="tab-content"></div>
    <div id="tab-creative" class="tab-content"></div>`;

  document.getElementById("cFrom").addEventListener("change",e=>{state.from=e.target.value; clearPreset(); render();});
  document.getElementById("cTo").addEventListener("change",e=>{state.to=e.target.value; clearPreset(); render();});
  document.querySelectorAll(".preset").forEach(b=>b.addEventListener("click",()=>applyPreset(b.dataset.preset,b)));
  document.querySelectorAll(".tab-btn").forEach(b=>b.addEventListener("click",()=>{
    document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(x=>x.classList.remove("active"));
    b.classList.add("active"); document.getElementById("tab-"+b.dataset.tab).classList.add("active");
    state.tab=b.dataset.tab; render();
  }));
}
function clearPreset(){ document.querySelectorAll(".preset").forEach(b=>b.classList.remove("active")); }
function shiftDays(d,n){ const x=new Date(d+"T00:00:00"); x.setDate(x.getDate()-n); return x.toISOString().slice(0,10); }
function applyPreset(p,btn){
  clearPreset(); if(btn)btn.classList.add("active");
  if(p==="All"){ state.from=DMIN; state.to=DMAX; }
  else { const n={"7d":6,"14d":13,"30d":29}[p]; state.to=DMAX; state.from=shiftDays(DMAX,n); if(state.from<DMIN)state.from=DMIN; }
  document.getElementById("cFrom").value=state.from; document.getElementById("cTo").value=state.to;
  render();
}

/* ── Render ──────────────────────────────────────────────────────── */
function render(){
  const f=filtered();
  document.getElementById("rowNote").textContent=`${f.length} rows · ${state.from} to ${state.to}`;
  document.getElementById("range").textContent=`${state.from}  to  ${state.to}`;
  if(state.tab==="overview") renderOverview(f);
  else if(state.tab==="trends") renderTrends(f);
  else if(state.tab==="leaderboard") renderLeaderboard(f);
  else if(state.tab==="campaigns") renderCampaigns(f);
  else if(state.tab==="breakdowns") renderBreakdowns(f);
  else if(state.tab==="byad") renderByAd(f);
  else if(state.tab==="headlines") renderHeadlines(f);
  else if(state.tab==="funnel") renderFunnel(f);
  else if(state.tab==="pacing") renderPacing(f);
  else if(state.tab==="creative") renderCreative(f);
}

/* ── Shared: a simple dimension breakdown (table + bar) into a target div ── */
function aggByDim(rows,dimKey){
  const g=groupBy(rows,dimKey);
  let out=Object.entries(g).map(([k,rs])=>({k,...agg(rs)}));
  out=out.filter(x=>x.k!=="(none)"||out.length===1);
  out.sort((a,b)=>IS_ROAS?((a.rev&&b.rev)?b.roas-a.roas:b.spend-a.spend):((a.leads&&b.leads)?a.cpa-b.cpa:b.spend-a.spend));
  return out;
}
function dimTable(out){
  const rh=IS_ROAS?`<th class="num">Revenue</th><th class="num">ROAS</th>`:`<th class="num">${RESULT_LABEL}</th><th class="num">CPA</th>`;
  const body=out.map(x=>`<tr><td>${x.k}</td><td class="num">${money(x.spend)}</td>`+
    (IS_ROAS?`<td class="num">${money(x.rev)}</td><td class="num">${x.rev?x.roas.toFixed(2)+"x":"—"}</td>`
            :`<td class="num">${num(x.leads)||"—"}</td><td class="num">${x.leads?money(x.cpa):"—"}</td>`)+`</tr>`).join("");
  return `<table><thead><tr><th>Value</th><th class="num">Spend</th>${rh}</tr></thead><tbody>${body}</tbody></table>`;
}
function dimChart(id,out){
  const top=out.slice().sort((a,b)=>b.spend-a.spend).slice(0,12);
  makeChart(id,{type:"bar",data:{labels:top.map(x=>x.k),datasets:[{label:"Spend",data:top.map(x=>x.spend),backgroundColor:top.map((_,i)=>COLORS[i%COLORS.length])}]},
    options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>"$"+v.toLocaleString()}}}}});
}
function renderCampaigns(f){
  const out=aggByDim(f,"Campaign");
  document.getElementById("tab-campaigns").innerHTML=
    `<div class="card"><h2>By Campaign</h2><div class="chart-wrap" style="height:280px;"><canvas id="campChart"></canvas></div></div>
     <div class="card">${dimTable(out)}</div>`;
  dimChart("campChart",out);
}
function renderFunnel(f){
  const out=aggByDim(f,"Funnel");
  document.getElementById("tab-funnel").innerHTML=
    `<div class="card"><h2>By Funnel stage</h2><div class="chart-wrap" style="height:260px;"><canvas id="funChart"></canvas></div></div>
     <div class="card">${dimTable(out)}</div>`;
  dimChart("funChart",out);
}

/* ── Per-ad aggregation (shared by Leaderboard / By Ad / Creative) ── */
function adsAgg(rows){
  const byAd={};
  rows.forEach(r=>{ const id=r["Ad ID"]; const a=byAd[id]||(byAd[id]={id,name:r["Ad Name"],campaign:r["Campaign"],
    format:r["Format"],audience:r["Audience"],funnel:r["Funnel"],headline:r._headline,body:r._body,
    spend:0,leads:0,rev:0,imp:0,clicks:0,tags:r}); a.spend+=r._spend;a.leads+=r._leads;a.rev+=r._rev;a.imp+=r._imp;a.clicks+=r._clicks; });
  return Object.values(byAd).map(a=>({...a,cpa:a.leads?a.spend/a.leads:0,roas:a.spend&&a.rev?a.rev/a.spend:0,
    ctr:a.imp?a.clicks/a.imp*100:0}));
}
function bestFirst(ads){ return ads.slice().sort((a,b)=>IS_ROAS?((a.rev&&b.rev)?b.roas-a.roas:b.spend-a.spend):((a.leads&&b.leads)?a.cpa-b.cpa:(a.leads?-1:b.leads?1:b.spend-a.spend))); }

let lbMinSpend=0;
function renderLeaderboard(f){
  let ads=bestFirst(adsAgg(f).filter(a=>a.spend>=lbMinSpend && (IS_ROAS?a.rev>0:a.leads>0)));
  const rows=ads.slice(0,25).map((a,i)=>`<tr><td class="num">${i+1}</td><td class="adname">${a.name||""}</td>
    <td><span class="pill">${a.format||"—"}</span></td><td>${a.funnel||"—"}</td>
    <td class="num">${money(a.spend)}</td>`+
    (IS_ROAS?`<td class="num">${money(a.rev)}</td><td class="num good">${a.roas.toFixed(2)}x</td>`
            :`<td class="num">${num(a.leads)}</td><td class="num good">${money(a.cpa)}</td>`)+`</tr>`).join("");
  const rh=IS_ROAS?`<th class="num">Revenue</th><th class="num">ROAS</th>`:`<th class="num">${RESULT_LABEL}</th><th class="num">CPA</th>`;
  document.getElementById("tab-leaderboard").innerHTML=
    `<div class="card"><h2>Top ads by ${IS_ROAS?"ROAS":"cost per "+RESULT_ONE}
       <label style="float:right;font-size:12px;color:var(--muted);">Min spend $<input type="number" id="lbMin" value="${lbMinSpend}" style="width:80px;font:inherit;padding:3px 6px;border:1px solid var(--border);border-radius:6px;"></label></h2>
       <div style="overflow-x:auto"><table><thead><tr><th class="num">#</th><th>Ad</th><th>Format</th><th>Funnel</th><th class="num">Spend</th>${rh}</tr></thead><tbody>${rows}</tbody></table></div></div>`;
  const inp=document.getElementById("lbMin");
  inp.addEventListener("change",e=>{lbMinSpend=+e.target.value||0; renderLeaderboard(filtered());});
}

let byAdSort={col:null,asc:true};
function renderByAd(f){
  let ads=adsAgg(f);
  const sval=(a,c)=>{const m={name:(a.name||"").toLowerCase(),campaign:(a.campaign||"").toLowerCase(),format:(a.format||"").toLowerCase(),
    audience:(a.audience||"").toLowerCase(),funnel:(a.funnel||"").toLowerCase(),spend:a.spend,imp:a.imp,clicks:a.clicks,ctr:a.ctr,leads:a.leads,rev:a.rev,cpa:a.cpa,roas:a.roas};return m[c];};
  if(byAdSort.col){ const c=byAdSort.col,s=byAdSort.asc?1:-1; ads.sort((a,b)=>{const va=sval(a,c),vb=sval(b,c);return va<vb?-s:va>vb?s:0;}); }
  else ads=bestFirst(ads);
  const arr=c=>byAdSort.col===c?(byAdSort.asc?" ▲":" ▼"):"";

  const head=`<tr>${sth("name","Ad")}${sth("campaign","Campaign")}${sth("format","Format")}${sth("audience","Audience")}${sth("funnel","Funnel")}${sth("spend","Spend","num")}${sth("imp","Impr","num")}${sth("clicks","Clicks","num")}${sth("ctr","CTR","num")}${rh}</tr>`;
  const rows=ads.map(a=>`<tr><td class="adname">${a.name||""}</td><td>${a.campaign||"—"}</td><td><span class="pill">${a.format||"—"}</span></td>
    <td>${a.audience||"—"}</td><td>${a.funnel||"—"}</td><td class="num">${money(a.spend)}</td><td class="num">${num(a.imp)}</td>
    <td class="num">${num(a.clicks)}</td><td class="num">${a.ctr.toFixed(2)}%</td>`+
    (IS_ROAS?`<td class="num">${money(a.rev)}</td><td class="num">${a.rev?a.roas.toFixed(2)+"x":"—"}</td>`
            :`<td class="num">${num(a.leads)||"—"}</td><td class="num">${a.leads?money(a.cpa):"—"}</td>`)+`</tr>`).join("");
  document.getElementById("tab-byad").innerHTML=
    `<div class="card"><h2>By Ad</h2><div style="overflow-x:auto"><table><thead>${head}</thead><tbody>${rows}</tbody></table></div></div>`;
  document.querySelectorAll("#tab-byad th[data-sort]").forEach(th=>th.addEventListener("click",()=>{
    const c=th.dataset.sort; if(byAdSort.col===c)byAdSort.asc=!byAdSort.asc; else {byAdSort.col=c; byAdSort.asc=(c==="name"||c==="campaign"||c==="format"||c==="audience"||c==="funnel"||c==="cpa");}
    renderByAd(filtered());
  }));
}

function renderHeadlines(f){
  const hasCopy=ROWS.some(r=>r._headline||r._body);
  if(!hasCopy){ document.getElementById("tab-headlines").innerHTML=
    `<div class="card"><div class="note">No ad copy yet. Re-run the engine to populate Headline / Primary Text in the product sheet.</div></div>`; return; }
  function grp(rows,field){ const g={}; rows.forEach(r=>{ const k=(r[field]||"").toString().trim(); if(!k) return; (g[k]=g[k]||[]).push(r); });
    let out=Object.entries(g).map(([k,rs])=>({k,...agg(rs)}));
    out.sort((a,b)=>IS_ROAS?b.roas-a.roas:(a.leads&&b.leads)?a.cpa-b.cpa:b.spend-a.spend); return out; }
  const heads=grp(f,"_headline"), bodies=grp(f,"_body");
  const rh=IS_ROAS?`<th class="num">Revenue</th><th class="num">ROAS</th>`:`<th class="num">${RESULT_LABEL}</th><th class="num">CPA</th>`;
  const tbl=(out)=>`<table><thead><tr><th>Text</th><th class="num">Spend</th>${rh}</tr></thead><tbody>`+
    out.map(x=>`<tr><td style="white-space:normal;max-width:520px;">${(x.k||"").slice(0,180)}</td><td class="num">${money(x.spend)}</td>`+
      (IS_ROAS?`<td class="num">${money(x.rev)}</td><td class="num">${x.rev?x.roas.toFixed(2)+"x":"—"}</td>`
              :`<td class="num">${num(x.leads)||"—"}</td><td class="num">${x.leads?money(x.cpa):"—"}</td>`)+`</tr>`).join("")+`</tbody></table>`;
  document.getElementById("tab-headlines").innerHTML=
    `<div class="card"><h2>By Headline</h2><div style="overflow-x:auto">${tbl(heads)}</div></div>`+
    `<div class="card"><h2>By Primary Text</h2><div style="overflow-x:auto">${tbl(bodies)}</div></div>`;
}

function renderPacing(f){
  // pacing is month-to-date for the current month vs an entered budget
  const today=DMAX; const ym=today.slice(0,7); const monthStart=ym+"-01";
  const mtdRows=ROWS.filter(r=>r._date>=monthStart && r._date<=today);
  const mtd=agg(mtdRows).spend;
  const dayNum=+today.slice(8,10); const daysInMonth=new Date(+ym.slice(0,4), +ym.slice(5,7), 0).getDate();
  const projected=dayNum?mtd/dayNum*daysInMonth:0;
  // Precedence: budget typed into the page > sheet Budgets tab > client config.
  const sheetBudget=monthlyBudgetFor(ym);
  const budget=+(localStorage.getItem("adsBudget_"+CLIENT_KEY)||sheetBudget||CFG.monthlyBudget||0);
  const pacePct=budget?projected/budget*100:0;
  const status=!budget?"—":projected>budget*1.05?"OVER PACE":projected<budget*0.9?"UNDER PACE":"ON TRACK";
  const statusColor=status==="OVER PACE"?"var(--bad)":status==="UNDER PACE"?"#FFA500":"var(--good)";
  document.getElementById("tab-pacing").innerHTML=
    `<div class="card"><h2>Budget Pacing — ${ym}
      <label style="float:right;font-size:13px;font-weight:400;">Monthly budget $<input type="number" id="pcBudget" value="${budget||""}" placeholder="0" style="width:110px;font:inherit;padding:4px 7px;border:1px solid var(--border);border-radius:6px;"></label></h2>
      <div class="kpis">
        <div class="kpi"><div class="label">Spent (MTD)</div><div class="val">${money(mtd)}</div></div>
        <div class="kpi"><div class="label">Projected EOM</div><div class="val">${money(projected)}</div></div>
        <div class="kpi"><div class="label">Budget</div><div class="val">${budget?money(budget):"—"}</div></div>
        <div class="kpi"><div class="label">Status</div><div class="val" style="color:${statusColor};font-size:20px;">${status}</div></div>
      </div>
      <div style="background:var(--header-bg);border-radius:9px;height:26px;overflow:hidden;margin-top:6px;">
        <div style="height:100%;width:${Math.min(pacePct,100)}%;background:${statusColor};"></div></div>
      <div class="note">${budget?`Projected ${pacePct.toFixed(0)}% of budget · day ${dayNum} of ${daysInMonth}`+(localStorage.getItem("adsBudget_"+CLIENT_KEY)?" · manual override (clear the box to use the sheet)":sheetBudget?" · from the sheet's Budgets tab":""):"Enter a monthly budget here, or add a row to the sheet's Budgets tab (Month, Budget)."}</div>
    </div>`;
  document.getElementById("pcBudget").addEventListener("change",e=>{ localStorage.setItem("adsBudget_"+CLIENT_KEY, e.target.value||""); renderPacing(filtered()); });
}

function kpiHtml(f){
  const t=agg(f);
  const resultK=IS_ROAS
    ? `<div class="kpi"><div class="label">Revenue</div><div class="val">${money(t.rev)}</div></div>
       <div class="kpi"><div class="label">Blended ROAS</div><div class="val">${t.roas.toFixed(2)}x</div></div>`
    : `<div class="kpi"><div class="label">${RESULT_LABEL}</div><div class="val">${num(t.leads)}</div></div>
       <div class="kpi"><div class="label">Blended CPA</div><div class="val">${money(t.cpa)}</div></div>`;
  return `<div class="kpis">
    <div class="kpi"><div class="label">Total Spend</div><div class="val">${money(t.spend)}</div></div>
    ${resultK}
    <div class="kpi"><div class="label">Active Ads</div><div class="val">${t.ads}</div></div></div>`;
}

function makeChart(id,cfg){ if(charts[id])charts[id].destroy(); const el=document.getElementById(id); if(el)charts[id]=new Chart(el,cfg); }
function dailySeries(rows){
  const by={}; rows.forEach(r=>{ const d=r._date; const b=by[d]=by[d]||{spend:0,leads:0,rev:0}; b.spend+=r._spend; b.leads+=r._leads; b.rev+=r._rev; });
  const days=Object.keys(by).sort();
  return {days, spend:days.map(d=>by[d].spend), result:days.map(d=>IS_ROAS?by[d].rev:by[d].leads)};
}

/* ── Overview period tables: week-over-week + month-over-month, all campaigns ── */
const MONTH_NAMES=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtDate(x){ return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0"); }
function weekKey(d){ const x=new Date(d+"T00:00:00"); if(isNaN(x))return d; const day=x.getDay(); x.setDate(x.getDate()-(day===0?6:day-1)); return fmtDate(x); }
function monthKey(d){ return String(d).slice(0,7); }
function monthLabel(k){ const p=k.split("-"); return p.length===2?(MONTH_NAMES[+p[1]-1]||p[1])+" "+p[0]:k; }
function periodTable(rows,keyFn,colLabel,labelFn){
  const g={}; rows.forEach(r=>{ const k=keyFn(r._date); (g[k]=g[k]||[]).push(r); });
  const out=Object.entries(g).map(([k,rs])=>({k,...agg(rs)})).sort((a,b)=>b.k.localeCompare(a.k));
  const rh=IS_ROAS?`<th class="num">Revenue</th><th class="num">ROAS</th>`:`<th class="num">${RESULT_LABEL}</th><th class="num">CPA</th>`;
  const body=out.map(x=>{
    const ctr=x.imp?x.clicks/x.imp*100:0;
    return `<tr><td>${labelFn?labelFn(x.k):x.k}</td><td class="num">${money(x.spend)}</td><td class="num">${num(x.imp)}</td>`+
      `<td class="num">${num(x.clicks)}</td><td class="num">${ctr.toFixed(2)}%</td>`+
      (IS_ROAS?`<td class="num">${money(x.rev)}</td><td class="num">${x.rev?x.roas.toFixed(2)+"x":"—"}</td>`
              :`<td class="num">${num(x.leads)||"—"}</td><td class="num">${x.leads?money(x.cpa):"—"}</td>`)+`</tr>`;
  }).join("");
  return `<table><thead><tr><th>${colLabel}</th><th class="num">Spend</th><th class="num">Impr</th><th class="num">Clicks</th><th class="num">CTR</th>${rh}</tr></thead><tbody>${body}</tbody></table>`;
}

let bdDim=BREAKDOWN_DIMS[0];

  out.sort((a,b)=>IS_ROAS?((a.rev&&b.rev)?b.roas-a.roas:b.spend-a.spend):((a.leads&&b.leads)?a.cpa-b.cpa:b.spend-a.spend));
  const top=out.slice().sort((a,b)=>b.spend-a.spend).slice(0,12);

     (IS_ROAS?`<td class="num">${money(x.rev)}</td><td class="num">${x.rev?x.roas.toFixed(2)+"x":"—"}</td>`
             :`<td class="num">${num(x.leads)||"—"}</td><td class="num">${x.leads?money(x.cpa):"—"}</td>`)+`</tr>`).join("");

       ${AI_DIMS.includes(bdDim)?'<span class="aimark">✨ AI</span>':''}</h2>
       <div class="chart-wrap" style="height:280px;"><canvas id="bdChart"></canvas></div></div>
     <div class="card"><table><thead><tr><th>${bdDim}</th><th class="num">Spend</th>${resultHead}</tr></thead><tbody>${body}</tbody></table></div>`;
  document.getElementById("bdSel").addEventListener("change",e=>{bdDim=e.target.value; renderBreakdowns(filtered());});
  makeChart("bdChart",{type:"bar",

    options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>"$"+v.toLocaleString()}}}}});
}

let crSort={col:null,asc:true};
function renderCreative(f){
  // aggregate filtered daily rows per ad
  const byAd={};
  f.forEach(r=>{ const id=r["Ad ID"]; const a=byAd[id]||(byAd[id]={id,name:r["Ad Name"],format:r["Format"],funnel:r["Funnel"],
    spend:0,leads:0,rev:0,tags:r}); a.spend+=r._spend; a.leads+=r._leads; a.rev+=r._rev; });
  let ads=Object.values(byAd).map(a=>({...a, cpa:a.leads?a.spend/a.leads:0, roas:a.spend&&a.rev?a.rev/a.spend:0}));
  const smart=(a,b)=>IS_ROAS?((a.rev&&b.rev)?b.roas-a.roas:b.spend-a.spend):((a.leads&&b.leads)?a.cpa-b.cpa:(a.leads?-1:b.leads?1:b.spend-a.spend));
  const sval=(a,c)=>{ if(c==="spend")return a.spend; if(c==="leads")return a.leads; if(c==="rev")return a.rev;
    if(c==="cpa")return a.cpa; if(c==="roas")return a.roas; if(c==="name")return (a.name||"").toLowerCase();
    if(c==="format")return (a.format||"").toLowerCase(); if(c==="funnel")return (a.funnel||"").toLowerCase();
    return (a.tags[c]||"").toString().toLowerCase(); };
  ads.sort(crSort.col?((a,b)=>{const va=sval(a,crSort.col),vb=sval(b,crSort.col),s=crSort.asc?1:-1;return va<vb?-s:va>vb?s:0;}):smart);
  const arr=c=>crSort.col===c?(crSort.asc?" ▲":" ▼"):"";
  const sth=(c,l,cls)=>`<th class="${cls||""}" data-sort="${c}">${l}${arr(c)}</th>`;
  const aiCols=AI_DIMS;
  const resultHead=IS_ROAS?sth("rev","Revenue","num")+sth("roas","ROAS","num"):sth("leads",RESULT_LABEL,"num")+sth("cpa","CPA","num");
  const head=`<tr>${sth("name","Ad")}${sth("format","Format")}${sth("funnel","Funnel")}`+
    aiCols.map(d=>sth(d,d,"ai")).join("")+sth("spend","Spend","num")+resultHead+`</tr>`;
  const rows=ads.map(a=>{
    const resultCells=IS_ROAS
      ? `<td class="num">${money(a.rev)}</td><td class="num ${a.rev?(a.roas>=1?"good":"bad"):""}">${a.rev?a.roas.toFixed(2)+"x":"—"}</td>`
      : `<td class="num">${num(a.leads)||"—"}</td><td class="num">${a.leads?money(a.cpa):"—"}</td>`;
    return `<tr><td class="adname">${a.name||""}</td><td><span class="pill">${a.format||"—"}</span></td><td>${a.funnel||"—"}</td>`+
      aiCols.map(d=>`<td class="ai edit" data-adid="${a.id}" data-field="${d}">${d===aiCols[0]?'<span class="ai-pill">'+(a.tags[d]||"—")+'</span>':(a.tags[d]||"—")}</td>`).join("")+
      `<td class="num">${money(a.spend)}</td>${resultCells}</tr>`;
  }).join("");
  document.getElementById("tab-creative").innerHTML=kpiHtml(f)+
    `<div class="card"><h2>Ads — ranked by ${IS_ROAS?"ROAS":"cost per "+RESULT_ONE}
       <span class="aimark">✨ creative tagged by Claude</span></h2>
       <div class="warn-bar">✎ Click any AI tag to edit it. Your change overrides the AI and saves to the tagging sheet${WEBHOOK_URL?"":" (saving not configured for this client yet)"}.</div>
       <div style="overflow-x:auto"><table><thead>${head}</thead><tbody>${rows}</tbody></table></div></div>`;
  document.querySelectorAll("#tab-creative th[data-sort]").forEach(th=>th.addEventListener("click",()=>{
    const c=th.dataset.sort;
    if(crSort.col===c)crSort.asc=!crSort.asc; else {crSort.col=c; crSort.asc=(c==="name"||c==="format"||c==="funnel"||c==="cpa"||AI_DIMS.includes(c));}
    renderCreative(filtered());
  }));
  wireCreativeEdit();
}

/* ── Inline tag editing (Creative tab), saved back via the client webhook ── */
let _warned=false;
function wireCreativeEdit(){
  const el=document.getElementById("tab-creative");
  if(!el || el._wired) return; el._wired=true;   // delegate once; survives re-renders
  el.addEventListener("click", e=>{
    const cell=e.target.closest("td.edit");
    if(!cell || cell.querySelector(".cell-edit")) return;
    if(_warned){ beginEdit(cell); return; }
    const m=document.getElementById("editWarn"); m.classList.add("show");
    document.getElementById("warnOk").onclick=()=>{ if(document.getElementById("dontWarn").checked)_warned=true; m.classList.remove("show"); beginEdit(cell); };
    document.getElementById("warnCancel").onclick=()=>m.classList.remove("show");
  });
}
function beginEdit(cell){
  const field=cell.dataset.field, cur=cell.textContent.trim(), opts=EDIT_OPTIONS[field];
  let inp;
  if(opts){ inp=document.createElement("select"); inp.className="cell-edit";
    opts.forEach(o=>{const op=document.createElement("option");op.value=o;op.textContent=o;if(o===cur)op.selected=true;inp.appendChild(op);}); }
  else { inp=document.createElement("input"); inp.className="cell-edit"; inp.value=(cur==="—"?"":cur); inp.size=24; }
  cell.innerHTML=""; cell.appendChild(inp); inp.focus();
  const commit=()=>commitEdit(cell,field,inp.value);
  inp.addEventListener("blur",commit,{once:true});
  inp.addEventListener("keydown",ev=>{ if(ev.key==="Enter"){ev.preventDefault();inp.blur();} if(ev.key==="Escape"){inp.removeEventListener("blur",commit); cell.textContent=cur;} });
  if(opts) inp.addEventListener("change",()=>inp.blur());
}
function commitEdit(cell,field,value){
  const adid=cell.dataset.adid; value=(value||"").trim();
  if(field===AI_DIMS[0]) cell.innerHTML='<span class="ai-pill">'+(value||"—")+'</span>'; else cell.textContent=value||"—";
  ROWS.forEach(r=>{ if(String(r["Ad ID"])===String(adid)) r[field]=value; });   // so breakdowns recompute
  cell.classList.remove("saved"); cell.classList.add("unsaved");
  if(!WEBHOOK_URL) return;
  fetch(WEBHOOK_URL,{method:"POST",mode:"no-cors",body:new URLSearchParams({ad_id:adid,field:field,value:value})})
    .then(()=>{cell.classList.remove("unsaved");cell.classList.add("saved");}).catch(()=>{});
}
</script>

    <h3>You're editing an AI tag</h3>
    <p>This replaces the tag Claude generated and saves it to your tagging sheet. The AI won't change it back unless you run a full re-tag.</p>
    <label><input type="checkbox" id="dontWarn"> Don't warn me again this session</label>
    <div class="row"><button id="warnCancel">Cancel</button><button class="primary" id="warnOk">Got it, edit</button></div>
  </div>
</div>
